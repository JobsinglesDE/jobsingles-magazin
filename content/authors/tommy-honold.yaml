name: Tommy Honold
role: Gründer & Dating-Experte
bio: >-
  Gründer des Jobsingles-Netzwerks und seit 2008 der Mann hinter dem grössten
  Berufs-Dating-Netzwerk im DACH-Raum. Tommy Honold bringt Menschen mit
  fordernden Berufen zusammen — Landwirte, Mediziner, Blaulicht, Gastro und
  Handwerk — die wissen, wie Schichtdienst und Arbeitsdruck eine Beziehung wiegen.
longBio: >-
  Tommy Honold, geboren 1977 am Bodensee, ist der Gründer des
  Jobsingles-Netzwerks — dem Dating der Berufe. Was 2008 als Idee für eine
  einzelne Berufsgruppe begann, ist heute ein Verbund spezialisierter
  Plattformen für Menschen, deren Beruf den Alltag bestimmt.

  Die Idee ist über die Jahre dieselbe geblieben: Partnersuche funktioniert
  besser, wenn das Gegenüber den eigenen Arbeitsrhythmus nicht erst erklärt
  bekommen muss. Schichtdienst, Wochenenddienst, Bereitschaft, lange Saisons —
  wer das selbst kennt, versteht es ohne viele Worte. Genau dafür ist das
  Jobsingles-Netzwerk gebaut.

  Heute verbindet das Netzwerk Landwirte, Mediziner, Einsatzkräfte aus Polizei,
  Feuerwehr und Sanität, Gastro-Profis und Handwerker. Tommy schreibt im Magazin
  über Berufsalltag, Partnersuche und die Frage, wie Beziehungen halten, wenn
  der Job mehr verlangt als einen Nine-to-five-Tag.
